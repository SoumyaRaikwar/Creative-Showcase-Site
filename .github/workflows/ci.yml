name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deployables:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build referenced TypeScript libs
        run: pnpm exec tsc -b lib/db lib/api-zod lib/api-client-react --force

      - name: Typecheck API
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Typecheck Portfolio
        run: pnpm --filter @workspace/portfolio run typecheck

      - name: Build Portfolio
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/portfolio run build
